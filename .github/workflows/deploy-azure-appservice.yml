name: Deploy (Azure App Service)

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-azure-appservice
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ vars.AZURE_DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Build Next.js app
        run: npm run build

      - name: Prepare standalone artifact
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public 2>/dev/null || true

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Disable Oryx server-side build
        run: |
          az webapp config appsettings set \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name "${{ vars.AZURE_WEBAPP_NAME }}" \
            --settings SCM_DO_BUILD_DURING_DEPLOYMENT=false \
            --output none

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          package: .next/standalone

      - name: Set startup command
        run: |
          az webapp config set \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name "${{ vars.AZURE_WEBAPP_NAME }}" \
            --startup-file "node server.js" \
            --output none

      - name: Verify deployment
        run: |
          sleep 15
          url="https://${{ vars.AZURE_WEBAPP_NAME }}.azurewebsites.net"
          status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$url")
          echo "Site returned HTTP $status"
          if [ "$status" -ge 500 ]; then
            echo "::error::Site returned HTTP $status"
            exit 1
          fi \
            -o jsonc
