name: Visual Regression

on:
  workflow_dispatch:
    inputs:
      update_snapshots:
        description: 'Update baseline snapshots (commit + push required separately)'
        required: false
        default: 'false'
        type: boolean
  pull_request:
    branches: [main]
    paths:
      - 'src/app/**'
      - 'src/components/**'
      - 'src/app/globals.css'
      - 'e2e/visual/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  visual:
    name: Visual Regression
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Minimal env vars so the Next.js app starts without crashing
      NEXTAUTH_SECRET: visual-regression-secret
      NEXTAUTH_URL: http://127.0.0.1:3000
      AZURE_AD_CLIENT_ID: vr-client-id
      AZURE_AD_CLIENT_SECRET: vr-client-secret
      AZURE_AD_TENANT_ID: vr-tenant-id
      # Skip DB-backed features in UI smoke
      DATABASE_URL: ""
      PW_REUSE_SERVER: "0"

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run visual regression tests
        run: |
          if [ "${{ inputs.update_snapshots }}" = "true" ]; then
            npx playwright test e2e/visual/visual.spec.ts --update-snapshots
          else
            npx playwright test e2e/visual/visual.spec.ts
          fi

      - name: Upload diff artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: visual-regression-diffs
          path: |
            playwright-report/
            test-results/
          retention-days: 7

      - name: Upload updated snapshots
        if: ${{ inputs.update_snapshots == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: visual-snapshots-updated
          path: e2e/visual/visual.spec.ts-snapshots/
          retention-days: 30
