name: Rotate Azure Maps SAS

"on":
  workflow_dispatch:
  schedule:
    - cron: '0 */8 * * *'

permissions:
  contents: read
  id-token: write

concurrency:
  group: rotate-azure-maps-sas
  cancel-in-progress: false

jobs:
  rotate:
    if: ${{ vars.AZURE_DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to Azure (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Rotate Azure Maps SAS token
        run: |
          chmod +x scripts/azure/rotate-maps-sas.sh
          MAPS_ARG=""
          if [ -n "${{ vars.AZURE_MAPS_ACCOUNT_NAME }}" ]; then
            MAPS_ARG="--maps-account-name ${{ vars.AZURE_MAPS_ACCOUNT_NAME }}"
          fi
          scripts/azure/rotate-maps-sas.sh \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --webapp-name "${{ vars.AZURE_WEBAPP_NAME }}" \
            --keyvault-name "${{ vars.AZURE_KEYVAULT_NAME }}" \
            $MAPS_ARG
