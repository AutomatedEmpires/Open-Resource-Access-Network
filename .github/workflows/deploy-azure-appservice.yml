name: Deploy (Azure App Service)

on:
  workflow_dispatch:
  # Keep deploy manual-only to avoid noisy runs on every push.

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-azure-appservice
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ vars.AZURE_DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    env:
      NEXT_TELEMETRY_DISABLED: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Validate App Service settings contract
        run: |
          az webapp config appsettings list \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name "${{ vars.AZURE_WEBAPP_NAME }}" \
            --query "[?value && value!=''].name" -o tsv > /tmp/oran-webapp-settings.txt
          node scripts/validate-runtime-env.mjs \
            --target webapp \
            --names-file /tmp/oran-webapp-settings.txt \
            --node-env production \
            --format github

      - name: Run tests
        run: npm run test

      - name: Build Next.js app
        run: npm run build

      - name: Prepare standalone artifact
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public 2>/dev/null || true

      - name: Configure App Service for Run From Package
        run: |
          az webapp config appsettings set \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name "${{ vars.AZURE_WEBAPP_NAME }}" \
            --settings \
              SCM_DO_BUILD_DURING_DEPLOYMENT=false \
              WEBSITE_RUN_FROM_PACKAGE=1 \
            --output none

          az webapp config set \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name "${{ vars.AZURE_WEBAPP_NAME }}" \
            --startup-file "node server.js" \
            --output none

      - name: Zip standalone artifact
        run: |
          cd .next/standalone
          zip -r -q ../../app.zip .
          echo "Zip size: $(du -h ../../app.zip | cut -f1)"

      - name: Stop app (free resources for Kudu)
        run: |
          az webapp stop \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name "${{ vars.AZURE_WEBAPP_NAME }}"

      - name: Deploy to Azure Web App (zip)
        run: |
          # az webapp deploy --async hangs on B1 despite the flag.
          # Use the Kudu zipdeploy REST API directly via curl instead.
          TOKEN=$(az account get-access-token --resource https://management.azure.com/ --query accessToken -o tsv)
          KUDU_URL="https://${{ vars.AZURE_WEBAPP_NAME }}.scm.azurewebsites.net/api/publish?type=zip&async=true"
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 120 \
            -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/zip" \
            --data-binary @app.zip \
            "$KUDU_URL")
          echo "Kudu returned HTTP $HTTP_STATUS"
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "::error::Zip deploy failed with HTTP $HTTP_STATUS"
            exit 1
          fi
          echo "Zip uploaded successfully — waiting for extraction..."
          sleep 10
        timeout-minutes: 3

      - name: Start app and verify
        run: |
          az webapp start \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name "${{ vars.AZURE_WEBAPP_NAME }}"
          echo "Waiting for cold start (B1 takes ~60s)..."
          sleep 60
          base_url="https://${{ vars.AZURE_WEBAPP_NAME }}.azurewebsites.net"
          health_url="$base_url/api/health"
          body_file="$(mktemp)"
          status=""
          for i in 1 2 3 4 5; do
            status=$(curl -sS -o "$body_file" -w "%{http_code}" --max-time 45 "$health_url" || true)
            echo "Readiness attempt $i: HTTP $status"
            if [ "$status" = "200" ]; then
              echo "Health endpoint is ready"
              break
            fi
            if [ -s "$body_file" ]; then
              echo "Latest readiness response:"
              cat "$body_file"
            fi
            if [ "$i" -lt 5 ]; then
              echo "Retrying in 20s..."
              sleep 20
            fi
          done

          if [ "$status" != "200" ]; then
            echo "::error::Deployment failed readiness verification."
            exit 1
          fi

          headers_file="$(mktemp)"
          curl -sS -D "$headers_file" -o /dev/null --max-time 45 "$base_url/"
          grep -qi '^content-security-policy:' "$headers_file" || {
            echo "::error::Missing Content-Security-Policy header on deployed app."
            exit 1
          }
          grep -qi '^x-frame-options:[[:space:]]*DENY' "$headers_file" || {
            echo "::error::Missing X-Frame-Options: DENY header on deployed app."
            exit 1
          }
          grep -qi '^x-content-type-options:[[:space:]]*nosniff' "$headers_file" || {
            echo "::error::Missing X-Content-Type-Options: nosniff header on deployed app."
            exit 1
          }
          echo "Deployment verified successfully"
