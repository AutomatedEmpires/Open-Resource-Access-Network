name: Data source import request
description: Request ingestion of a new source with licensing, mapping, and quality notes.
title: "[Data Import]: "
labels:
  - type:data
  - area:import
body:
  - type: markdown
    attributes:
      value: |
        Do not include personal data (PII) or private access tokens.
        External sources must not bypass import → stage → verify → publish.

  - type: input
    id: source_name_url
    attributes:
      label: Source name + URL
      placeholder: Source Name — https://...
    validations:
      required: true

  - type: dropdown
    id: data_format
    attributes:
      label: Data format
      options:
        - HSDS CSV
        - HSDS JSON
        - API (REST/GraphQL)
        - Spreadsheet/other
    validations:
      required: true

  - type: textarea
    id: license_terms_notes
    attributes:
      label: License/terms notes
    validations:
      required: true

  - type: dropdown
    id: pii_present
    attributes:
      label: Does the source contain PII?
      description: If yes/unsure, describe fields and minimization approach.
      options:
        - No
        - Yes
        - Unsure
    validations:
      required: true

  - type: textarea
    id: fields_available
    attributes:
      label: Fields available
    validations:
      required: true

  - type: input
    id: update_frequency
    attributes:
      label: Update frequency
      placeholder: daily / weekly / monthly / ad hoc
    validations:
      required: true

  - type: textarea
    id: known_quality_issues
    attributes:
      label: Known quality issues
    validations:
      required: true

  - type: input
    id: geographic_scope
    attributes:
      label: Geographic scope
      placeholder: city/county/state/country
    validations:
      required: true

  - type: textarea
    id: hsds_mapping
    attributes:
      label: Proposed mapping to HSDS
      description: organization/service/location/service_at_location/etc.
    validations:
      required: true

  - type: textarea
    id: taxonomy_mapping
    attributes:
      label: Taxonomy mapping approach
      description: ORAN categories + external taxonomy IDs (if any).
    validations:
      required: true

  - type: checkboxes
    id: source_reuse_and_integrity
    attributes:
      label: Confirmations
      options:
        - label: Source allows reuse/republishing.
        - label: We will not fabricate missing fields; unknown stays unknown.
        - label: We will not serve external-source results directly to seekers.
    validations:
      required: true

