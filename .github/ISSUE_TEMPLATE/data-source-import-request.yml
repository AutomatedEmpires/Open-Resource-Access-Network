name: Data source import request
about: Request ingestion of a new source with licensing, mapping, and quality notes.
title: "[Data Import]: "
labels:
  - type:data
  - area:import
body:
  - type: input
    id: source_name_url
    attributes:
      label: Source name + URL
      placeholder: Source Name — https://...
    validations:
      required: true

  - type: textarea
    id: license_terms_notes
    attributes:
      label: License/terms notes
    validations:
      required: true

  - type: textarea
    id: fields_available
    attributes:
      label: Fields available
    validations:
      required: true

  - type: input
    id: update_frequency
    attributes:
      label: Update frequency
      placeholder: daily / weekly / monthly / ad hoc
    validations:
      required: true

  - type: textarea
    id: known_quality_issues
    attributes:
      label: Known quality issues
    validations:
      required: true

  - type: textarea
    id: hsds_mapping
    attributes:
      label: Proposed mapping to HSDS
      description: organization/service/location/service_at_location/etc.
    validations:
      required: true

  - type: textarea
    id: taxonomy_mapping
    attributes:
      label: Taxonomy mapping approach
      description: ORAN categories + external taxonomy IDs (if any).
    validations:
      required: true

  - type: checkboxes
    id: source_reuse_and_integrity
    attributes:
      label: Confirmations
      options:
        - label: Source allows reuse/republishing.
        - label: We will not fabricate missing fields; unknown stays unknown.
    validations:
      required: true
