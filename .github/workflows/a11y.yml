name: Accessibility Gate

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

jobs:
  a11y:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test -- --reporter=verbose src/components/ui/__tests__/a11y.test.tsx
