name: Security & privacy report
description: Report a potential security or privacy issue responsibly.
title: "[Security]: "
labels:
  - type:security
  - area:security
body:
  - type: markdown
    attributes:
      value: |
        Please practice responsible disclosure. Do not post secrets, private keys, credentials, or exploit code publicly.
        If this includes secrets, do NOT paste them—rotate immediately and describe impact.

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: If unsure, choose P1.
      options:
        - P0
        - P1
        - P2
    validations:
      required: true

  - type: dropdown
    id: affected_surface
    attributes:
      label: Affected surface
      options:
        - api
        - auth
        - db
        - telemetry
        - ui
        - build/ci
        - other
    validations:
      required: true

  - type: checkboxes
    id: data_at_risk
    attributes:
      label: What data is at risk?
      options:
        - label: PII
        - label: profile
        - label: location
        - label: auth
        - label: session
        - label: logs
        - label: other
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: What could an attacker/user do? What is the worst-case outcome?
    validations:
      required: true

  - type: textarea
    id: suggested_mitigation
    attributes:
      label: Suggested mitigation
    validations:
      required: true

  - type: textarea
    id: repro_steps
    attributes:
      label: Steps to reproduce (optional)
      description: Provide safe, non-sensitive reproduction details only.
    validations:
      required: false

