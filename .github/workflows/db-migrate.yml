name: Database Migration

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - staging
          - prod

permissions:
  contents: read
  id-token: write

concurrency:
  group: db-migrate-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Retrieve DATABASE_URL from Key Vault
        id: db-url
        run: |
          DB_URL=$(az keyvault secret show \
            --vault-name "${{ vars.AZURE_KEYVAULT_NAME }}" \
            --name "database-url" \
            --query value -o tsv)
          echo "::add-mask::$DB_URL"
          echo "DATABASE_URL=$DB_URL" >> "$GITHUB_ENV"

      - name: Run Drizzle migrations
        run: npx drizzle-kit migrate
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Verify migration
        run: |
          echo "Migration completed for environment: ${{ inputs.environment }}"
