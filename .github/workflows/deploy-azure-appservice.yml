name: Deploy (Azure App Service)

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-azure-appservice
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ vars.AZURE_DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Zip source for deployment
        run: |
          zip -r app.zip . \
            -x "node_modules/**" \
            -x ".git/**" \
            -x ".next/**" \
            -x "coverage/**"

      - name: Deploy to Azure Web App (zip)
        uses: azure/CLI@v2
        with:
          azcliversion: 2.65.0
          inlineScript: |
            az webapp deploy \
              --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              --name "${{ secrets.AZURE_WEBAPP_NAME }}" \
              --src-path app.zip \
              --type zip
