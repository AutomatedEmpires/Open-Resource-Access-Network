codecov:
  notify:
    wait_for_ci: true

coverage:
  precision: 2
  round: down
  range: "50...80"

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: true

github_checks:
  annotations: true

status:
  project:
    default:
      target: auto
      threshold: 1%
      informational: false
  patch:
    default:
      target: 60%
      informational: false
