name: Runbook Freshness

on:
  pull_request:
    branches: [main]
    paths:
      - 'docs/ops/**'
      - 'scripts/check-runbook-freshness.mjs'
      - '.github/workflows/runbook-freshness.yml'
  push:
    branches: [main]
    paths:
      - 'docs/ops/**'
      - 'scripts/check-runbook-freshness.mjs'
      - '.github/workflows/runbook-freshness.yml'
  schedule:
    - cron: '0 13 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  freshness:
    name: Validate runbook review dates
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Check runbook freshness
        run: node scripts/check-runbook-freshness.mjs
