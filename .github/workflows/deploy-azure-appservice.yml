name: Deploy (Azure App Service)

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-azure-appservice
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ vars.AZURE_DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Build Next.js app
        run: npm run build

      - name: Prepare standalone artifact
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public 2>/dev/null || true

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Configure App Service for Run From Package
        run: |
          az webapp config appsettings set \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name "${{ vars.AZURE_WEBAPP_NAME }}" \
            --settings \
              SCM_DO_BUILD_DURING_DEPLOYMENT=false \
              WEBSITE_RUN_FROM_PACKAGE=1 \
            --output none

          az webapp config set \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name "${{ vars.AZURE_WEBAPP_NAME }}" \
            --startup-file "node server.js" \
            --output none

      - name: Zip standalone artifact
        run: |
          cd .next/standalone
          zip -r -q ../../app.zip .
          echo "Zip size: $(du -h ../../app.zip | cut -f1)"

      - name: Stop app (free resources for Kudu)
        run: |
          az webapp stop \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name "${{ vars.AZURE_WEBAPP_NAME }}"

      - name: Deploy to Azure Web App (zip)
        run: |
          az webapp deploy \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name "${{ vars.AZURE_WEBAPP_NAME }}" \
            --src-path app.zip \
            --type zip \
            --async true
        timeout-minutes: 5

      - name: Start app and verify
        run: |
          az webapp start \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name "${{ vars.AZURE_WEBAPP_NAME }}"
          echo "Waiting for app to start..."
          sleep 30
          url="https://${{ vars.AZURE_WEBAPP_NAME }}.azurewebsites.net"
          for i in 1 2 3; do
            status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$url")
            echo "Attempt $i: HTTP $status"
            if [ "$status" -lt 500 ]; then
              echo "Deployment verified successfully"
              exit 0
            fi
            sleep 15
          done
          echo "::error::Site not healthy after deploy"
          exit 1
