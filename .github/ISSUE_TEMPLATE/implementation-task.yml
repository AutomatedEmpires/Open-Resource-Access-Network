name: Implementation task
description: Define a bounded implementation slice with tests, docs, and safety checks.
title: "[Task]: "
labels:
  - type:scaffold
body:
  - type: markdown
    attributes:
      value: |
        Keep tasks small and testable. Do not include PII. If this changes safety-critical behavior, add/update an ADR and SSOT docs.

  - type: textarea
    id: what_building
    attributes:
      label: What you're building
    validations:
      required: true

  - type: textarea
    id: files_modules
    attributes:
      label: Files/modules likely touched
    validations:
      required: true

  - type: textarea
    id: tests_required
    attributes:
      label: Tests required (unit/integration)
      placeholder: |
        unit: ...
        integration: ...
    validations:
      required: true

  - type: dropdown
    id: migration_required
    attributes:
      label: Migration required?
      options:
        - "No"
        - "Yes"
    validations:
      required: true

  - type: textarea
    id: migration_details
    attributes:
      label: Migration details (if yes)
      description: Include rollout/backfill/rollback considerations.

  - type: checkboxes
    id: telemetry_required
    attributes:
      label: Telemetry required?
      options:
        - label: Sentry
        - label: logging
        - label: analytics
        - label: None
    validations:
      required: true

  - type: checkboxes
    id: accessibility_checks
    attributes:
      label: Accessibility checks required?
      options:
        - label: keyboard
        - label: ARIA
        - label: reduced motion
        - label: None
    validations:
      required: true

  - type: checkboxes
    id: safety_guardrails
    attributes:
      label: Safety-critical guardrails checked?
      options:
        - label: No hallucinated services or data introduced.
        - label: No guaranteed eligibility claims introduced.
        - label: Crisis routing expectations (911 / 988 / 211) preserved.
    validations:
      required: true

  - type: checkboxes
    id: scoring_contract
    attributes:
      label: Scoring Contract
      options:
        - label: If scoring is touched, preserve the 3-score model and final weight formula (0.45/0.40/0.15), unless approved in a spec + ADR.
    validations:
      required: true

  - type: checkboxes
    id: done_checklist
    attributes:
      label: Done checklist
      options:
        - label: Tests added/updated and passing.
        - label: Documentation updated if behavior changed.
        - label: docs/ENGINEERING_LOG.md updated if contract-level.
    validations:
      required: true
