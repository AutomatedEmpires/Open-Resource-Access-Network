name: Deploy (Azure Functions)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'functions/**'
      - 'scripts/build-functions.mjs'

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-azure-functions
  cancel-in-progress: true

jobs:
  deploy-functions:
    if: ${{ vars.AZURE_DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Login to Azure (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Validate Function App settings contract
        run: |
          az functionapp config appsettings list \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name "${{ vars.AZURE_FUNC_APP_NAME }}" \
            --query "[?value && value!=''].name" -o tsv > /tmp/oran-function-settings.txt
          node scripts/validate-runtime-env.mjs \
            --target functions \
            --names-file /tmp/oran-function-settings.txt \
            --node-env production \
            --format github

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build functions
        run: node scripts/build-functions.mjs

      - name: Deploy to Azure Functions
        uses: azure/functions-action@v1
        with:
          app-name: ${{ vars.AZURE_FUNC_APP_NAME }}
          package: dist

      - name: Verify deployment
        run: |
          echo "Functions deployed to: ${{ vars.AZURE_FUNC_APP_NAME }}"
          az functionapp function list \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name "${{ vars.AZURE_FUNC_APP_NAME }}" \
            --query "[].name" -o tsv
