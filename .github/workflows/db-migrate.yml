name: Database Migration

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - staging
          - prod

permissions:
  contents: read
  id-token: write

concurrency:
  group: db-migrate-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Retrieve DATABASE_URL from Key Vault
        id: db-url
        run: |
          DB_URL=$(az keyvault secret show \
            --vault-name "${{ vars.AZURE_KEYVAULT_NAME }}" \
            --name "database-url" \
            --query value -o tsv)
          echo "::add-mask::$DB_URL"
          echo "DATABASE_URL=$DB_URL" >> "$GITHUB_ENV"

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Run SQL migrations
        run: |
          set -euo pipefail

          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 <<'SQL'
          CREATE TABLE IF NOT EXISTS schema_migrations (
            filename text PRIMARY KEY,
            applied_at timestamptz NOT NULL DEFAULT now()
          );
          SQL

          while IFS= read -r file; do
            filename="$(basename "$file")"
            applied=$(psql "$DATABASE_URL" -At -v ON_ERROR_STOP=1 -c "SELECT 1 FROM schema_migrations WHERE filename = '$filename' LIMIT 1;")

            if [ "$applied" = "1" ]; then
              echo "Skipping already applied migration: $filename"
              continue
            fi

            echo "Applying migration: $filename"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$file"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c "INSERT INTO schema_migrations (filename) VALUES ('$filename');"
          done < <(find db/migrations -maxdepth 1 -type f -name '*.sql' | sort)
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Verify migration
        run: |
          echo "Migration completed for environment: ${{ inputs.environment }}"
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c "SELECT filename, applied_at FROM schema_migrations ORDER BY filename;"
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
