version: '3.8'

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: oran_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: oran
      POSTGRES_PASSWORD: oran_local_password
      POSTGRES_DB: oran_db
    ports:
      - "5432:5432"
    volumes:
      - oran_pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oran -d oran_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: oran_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@oran.local
      PGADMIN_DEFAULT_PASSWORD: pgadmin_local_password
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - oran_pgadmin_data:/var/lib/pgadmin

volumes:
  oran_pgdata:
  oran_pgadmin_data:
